<ng-container *ngIf="orderService.student$ | async as student">
  <div class="student">
    <div class="student-name">{{student.firstName}} {{student.lastName}}</div>
    <div class="student-class">{{student.classGrade}}</div>
    <div
      class="student-count"
      *ngIf="filledAll$ | async as count"
    >({{count[0]}}|{{count[1]}})</div>
  </div>
</ng-container>
