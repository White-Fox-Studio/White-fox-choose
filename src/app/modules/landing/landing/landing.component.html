<div class="rotate-overlay hidden">
  <div class="rotate-content">
    <svg viewBox="0 0 24 24" fill="currentColor" width="64px" height="64px">
      <path d="M16.48 2.52c3.27 1.55 5.61 4.72 5.97 8.48h1.5C23.44 4.84 18.29 0 12 0l-.66.03 3.81 3.81 1.33-1.32zM7.52 21.48C4.25 19.93 1.91 16.76 1.55 13H0c.51 6.16 5.66 11 11.95 11l.66-.03-3.81-3.81-1.28 1.32z"/>
    </svg>
    <p [innerHTML]="'landingRotateMessage' | language"></p>
  </div>
</div>
<div class="wrapper">
  <div class="page-container">
    <div *ngFor="let page of pages"
         class="page-block">
      <img [src]="'/assets/images/landing/'+page.img" [alt]="page.alt">
    </div>
  </div>
</div>
