<div class="container" (click)="tooltipShow()">
  <input
    class="pose-input"
    [class.readonly]="saved"
    [class.invalid]="invalid || highlight"
    type="number"
    [formControl]="poseControl"
    [placeholder]="pose | servTranslate: 'comment'"
  >
  <div
    class="pose-tooltip"
    [class.hidden]="tooltipHidden"
    #tooltipEL>
  </div>
</div>
